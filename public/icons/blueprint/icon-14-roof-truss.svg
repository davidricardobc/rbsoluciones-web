<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Roof Truss Structure -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bottom Chord -->
    <line x1="100" y1="320" x2="412" y2="320" opacity="0.95" stroke-width="4"/>
    <!-- Top Chords -->
    <line x1="100" y1="320" x2="256" y2="120" opacity="0.95" stroke-width="4"/>
    <line x1="256" y1="120" x2="412" y2="320" opacity="0.95" stroke-width="4"/>
    <!-- Vertical Members (Web) -->
    <line x1="178" y1="320" x2="178" y2="218" opacity="0.85" stroke-width="2.5"/>
    <line x1="256" y1="320" x2="256" y2="120" opacity="0.85" stroke-width="2.5"/>
    <line x1="334" y1="320" x2="334" y2="218" opacity="0.85" stroke-width="2.5"/>
    <!-- Diagonal Braces -->
    <line x1="178" y1="218" x2="256" y2="320" opacity="0.8"/>
    <line x1="256" y1="120" x2="334" y2="218" opacity="0.8"/>
    <line x1="256" y1="320" x2="334" y2="218" opacity="0.8"/>
    <line x1="178" y1="218" x2="256" y2="120" opacity="0.8"/>
    <!-- Support Connections at Bottom -->
    <rect x="95" y="315" width="15" height="10" opacity="0.9"/>
    <rect x="402" y="315" width="15" height="10" opacity="0.9"/>
    <rect x="173" y="315" width="10" height="10" opacity="0.8"/>
    <rect x="251" y="315" width="10" height="10" opacity="0.8"/>
    <rect x="329" y="315" width="10" height="10" opacity="0.8"/>
    <!-- Joint Connections -->
    <circle cx="100" cy="320" r="4" opacity="0.6" fill="#ffffff"/>
    <circle cx="178" cy="218" r="4" opacity="0.6" fill="#ffffff"/>
    <circle cx="256" cy="120" r="4" opacity="0.6" fill="#ffffff"/>
    <circle cx="334" cy="218" r="4" opacity="0.6" fill="#ffffff"/>
    <circle cx="412" cy="320" r="4" opacity="0.6" fill="#ffffff"/>
    <circle cx="178" cy="320" r="3" opacity="0.5" fill="#ffffff"/>
    <circle cx="256" cy="320" r="3" opacity="0.5" fill="#ffffff"/>
    <circle cx="334" cy="320" r="3" opacity="0.5" fill="#ffffff"/>
    <!-- Purlin Lines -->
    <line x1="150" y1="260" x2="150" y2="320" opacity="0.4" stroke-width="1"/>
    <line x1="210" y1="192" x2="210" y2="320" opacity="0.4" stroke-width="1"/>
    <line x1="302" y1="192" x2="302" y2="320" opacity="0.4" stroke-width="1"/>
    <line x1="362" y1="260" x2="362" y2="320" opacity="0.4" stroke-width="1"/>
  </g>
  
  <!-- Slope Angle Indicator -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.4" fill="none">
    <path d="M 100 320 Q 130 290 150 280"/>
    <text x="140" y="275" fill="#ffffff" font-size="8" opacity="0.5">θ=30°</text>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <!-- Span -->
    <line x1="100" y1="360" x2="412" y2="360"/>
    <line x1="100" y1="320" x2="100" y2="370"/>
    <line x1="412" y1="320" x2="412" y2="370"/>
    <text x="256" y="380" fill="#ffffff" font-size="10" text-anchor="middle" opacity="0.6">Span=10m</text>
    <!-- Height -->
    <line x1="70" y1="120" x2="70" y2="320"/>
    <line x1="65" y1="120" x2="75" y2="120"/>
    <line x1="65" y1="320" x2="75" y2="320"/>
    <text x="55" y="220" fill="#ffffff" font-size="9" text-anchor="end" opacity="0.6">H=2.5m</text>
  </g>
  
  <!-- Section Marks -->
  <text x="430" y="330" fill="#ffffff" font-size="8" opacity="0.4">A</text>
  <circle cx="425" cy="325" r="2" fill="#ffffff" opacity="0.3"/>
</svg>