<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Terrace Roof Structure - Isometric View -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Roof Panels -->
    <polygon points="140,180 256,120 372,180 256,240" opacity="0.9"/>
    <polygon points="140,180 256,240 256,260 140,200" opacity="0.7"/>
    <polygon points="256,240 372,180 372,200 256,260" opacity="0.6"/>
    <!-- Support Columns -->
    <polygon points="140,200 148,200 148,360 140,360" opacity="0.85"/>
    <polygon points="248,250 256,250 256,370 248,370" opacity="0.85"/>
    <polygon points="364,200 372,200 372,360 364,360" opacity="0.85"/>
    <!-- Cross Beams -->
    <line x1="144" y1="280" x2="368" y2="280" opacity="0.6" stroke-width="1.5"/>
    <line x1="144" y1="320" x2="368" y2="320" opacity="0.6" stroke-width="1.5"/>
    <!-- Roof Sections -->
    <line x1="180" y1="160" x2="180" y2="220" opacity="0.5" stroke-width="1"/>
    <line x1="220" y1="138" x2="220" y2="230" opacity="0.5" stroke-width="1"/>
    <line x1="292" y1="138" x2="292" y2="230" opacity="0.5" stroke-width="1"/>
    <line x1="332" y1="160" x2="332" y2="220" opacity="0.5" stroke-width="1"/>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <!-- Span dimension -->
    <line x1="120" y1="380" x2="392" y2="380"/>
    <line x1="140" y1="360" x2="140" y2="400"/>
    <line x1="372" y1="360" x2="372" y2="400"/>
    <text x="256" y="415" fill="#ffffff" font-size="10" text-anchor="middle" opacity="0.6">Span=6.0m</text>
    <!-- Slope indicator -->
    <line x1="110" y1="240" x2="256" y2="120" stroke-dasharray="3,3" opacity="0.4"/>
    <text x="80" y="200" fill="#ffffff" font-size="9" opacity="0.6">α=5%</text>
  </g>
  
  <!-- Drainage Symbol -->
  <g opacity="0.5">
    <circle cx="256" cy="180" r="4" stroke="#ffffff" stroke-width="1" fill="none"/>
    <line x1="256" y1="184" x2="256" y2="195" stroke="#ffffff" stroke-width="1"/>
    <polygon points="252,195 256,205 260,195" fill="#ffffff"/>
  </g>
</svg>