<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Main Pergola Structure -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Posts -->
    <rect x="120" y="200" width="12" height="180" opacity="0.9"/>
    <rect x="380" y="200" width="12" height="180" opacity="0.9"/>
    <rect x="180" y="200" width="12" height="180" opacity="0.9"/>
    <rect x="320" y="200" width="12" height="180" opacity="0.9"/>
    <!-- Top Beams -->
    <rect x="110" y="185" width="292" height="15" opacity="0.95"/>
    <!-- Cross Beams -->
    <rect x="105" y="150" width="302" height="10" opacity="0.85"/>
    <rect x="105" y="135" width="302" height="8" opacity="0.85"/>
    <rect x="105" y="122" width="302" height="6" opacity="0.85"/>
    <!-- Cross Members -->
    <rect x="130" y="150" width="6" height="35" opacity="0.7"/>
    <rect x="190" y="150" width="6" height="35" opacity="0.7"/>
    <rect x="250" y="150" width="6" height="35" opacity="0.7"/>
    <rect x="310" y="150" width="6" height="35" opacity="0.7"/>
    <rect x="370" y="150" width="6" height="35" opacity="0.7"/>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <!-- Height dimension -->
    <line x1="90" y1="380" x2="90" y2="135"/>
    <line x1="85" y1="380" x2="95" y2="380"/>
    <line x1="85" y1="135" x2="95" y2="135"/>
    <text x="75" y="257" fill="#ffffff" font-size="10" text-anchor="end" opacity="0.6">H=2.8m</text>
    <!-- Width dimension -->
    <line x1="105" y1="400" x2="407" y2="400"/>
    <line x1="105" y1="395" x2="105" y2="405"/>
    <line x1="407" y1="395" x2="407" y2="405"/>
    <text x="256" y="420" fill="#ffffff" font-size="10" text-anchor="middle" opacity="0.6">L=4.0m</text>
  </g>
  
  <!-- Section Marks -->
  <g fill="#ffffff" opacity="0.4">
    <circle cx="126" cy="290" r="3"/>
    <circle cx="386" cy="290" r="3"/>
    <circle cx="186" cy="290" r="3"/>
    <circle cx="326" cy="290" r="3"/>
  </g>
</svg>