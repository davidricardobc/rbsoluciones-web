<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Angle Grinder -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main Body Cylinder -->
    <ellipse cx="256" cy="220" rx="85" ry="55" opacity="0.95"/>
    <rect x="171" y="220" width="170" height="90" opacity="0.9"/>
    <ellipse cx="256" cy="310" rx="85" ry="55" opacity="0.7"/>
    <!-- Rear Cap -->
    <line x1="171" y1="220" x2="156" y2="210" opacity="0.8"/>
    <line x1="171" y1="310" x2="156" y2="320" opacity="0.8"/>
    <line x1="156" y1="210" x2="156" y2="320" opacity="0.8"/>
    <!-- Spindle Housing -->
    <rect x="320" y="180" width="50" height="40" opacity="0.9"/>
    <rect x="370" y="175" width="25" height="50" opacity="0.85"/>
    <!-- Guard -->
    <path d="M 395 180 Q 440 200 440 265 Q 440 330 395 350" opacity="0.7" stroke-width="1.5"/>
    <line x1="395" y1="180" x2="395" y2="350" opacity="0.7" stroke-width="1.5"/>
    <!-- Disc -->
    <ellipse cx="435" cy="265" rx="12" ry="95" opacity="0.6"/>
    <line x1="423" y1="265" x2="447" y2="265" opacity="0.9"/>
    <!-- Handle attachment -->
    <rect x="210" y="310" width="30" height="50" opacity="0.8"/>
    <!-- Side Handle -->
    <rect x="330" y="310" width="50" height="12" rx="3" opacity="0.85"/>
    <rect x="365" y="295" width="15" height="30" rx="3" opacity="0.85"/>
  </g>
  
  <!-- Technical Details -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.4" fill="none">
    <line x1="280" y1="230" x2="300" y2="245"/>
    <line x1="280" y1="250" x2="300" y2="265"/>
    <line x1="280" y1="270" x2="300" y2="285"/>
  </g>
  
  <!-- Dimension Line -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <line x1="140" y1="400" x2="400" y2="400"/>
    <line x1="156" y1="320" x2="156" y2="410"/>
    <line x1="395" y1="350" x2="395" y2="410"/>
    <text x="276" y="425" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.6">L=300mm</text>
  </g>
  
  <!-- Center Lines -->
  <line x1="256" y1="140" x2="256" y2="400" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="5,5" opacity="0.3"/>
</svg>