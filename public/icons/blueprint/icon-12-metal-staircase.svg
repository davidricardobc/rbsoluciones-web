<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Metal Staircase - Isometric View -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Stringer (Main Support Beam) -->
    <polygon points="420,400 420,360 120,360 120,400" opacity="0.9"/>
    <polygon points="120,360 420,360 350,200 350,180 120,180 120,360" opacity="0.7"/>
    <!-- Top Landing -->
    <rect x="100" y="160" width="80" height="80" opacity="0.95"/>
    <!-- Step Treads -->
    <rect x="180" y="332" width="52" height="8" opacity="0.85"/>
    <rect x="180" y="304" width="52" height="8" opacity="0.85"/>
    <rect x="180" y="276" width="52" height="8" opacity="0.85"/>
    <rect x="180" y="248" width="52" height="8" opacity="0.85"/>
    <rect x="180" y="220" width="52" height="8" opacity="0.85"/>
    <rect x="180" y="192" width="52" height="8" opacity="0.85"/>
    <!-- Riser Lines -->
    <line x1="232" y1="340" x2="232" y2="332" opacity="0.7"/>
    <line x1="232" y1="312" x2="232" y2="304" opacity="0.7"/>
    <line x1="232" y1="284" x2="232" y2="276" opacity="0.7"/>
    <line x1="232" y1="256" x2="232" y2="248" opacity="0.7"/>
    <line x1="232" y1="228" x2="232" y2="220" opacity="0.7"/>
    <line x1="232" y1="200" x2="232" y2="192" opacity="0.7"/>
    <!-- Handrail Posts -->
    <rect x="120" y="150" width="6" height="60" opacity="0.9"/>
    <rect x="180" y="150" width="6" height="265" opacity="0.9"/>
    <rect x="240" y="150" width="6" height="265" opacity="0.9"/>
    <rect x="340" y="200" width="6" height="160" opacity="0.9"/>
    <!-- Handrail -->
    <line x1="120" y1="150" x2="180" y2="150" opacity="0.95" stroke-width="3"/>
    <line x1="180" y1="150" x2="340" y2="200" opacity="0.95" stroke-width="3"/>
    <line x1="340" y1="200" x2="420" y2="360" opacity="0.7" stroke-width="2"/>
    <!-- Stringer Detail -->
    <line x1="324" y1="280" x2="324" y2="400" opacity="0.65" stroke-width="6"/>
    <line x1="220" y1="240" x2="220" y2="360" opacity="0.65" stroke-width="6"/>
    <!-- Bottom Support -->
    <rect x="350" y="400" width="70" height="8" opacity="0.8"/>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <!-- Total height -->
    <line x1="80" y1="160" x2="80" y2="400"/>
    <line x1="75" y1="160" x2="85" y2="160"/>
    <line x1="75" y1="400" x2="85" y2="400"/>
    <text x="70" y="280" fill="#ffffff" font-size="9" text-anchor="end" opacity="0.6">H=2.4m</text>
    <!-- Horizontal run -->
    <line x1="100" y1="420" x2="420" y2="420"/>
    <line x1="180" y1="360" x2="180" y2="430"/>
    <line x1="420" y1="400" x2="420" y2="430"/>
    <text x="300" y="440" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.6">L=3.0m</text>
  </g>
  
  <!-- Riser/Tread Annotation -->
  <text x="250" y="310" fill="#ffffff" font-size="8" opacity="0.5">170x280</text>
</svg>