<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Structural Column Base Detail -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Concrete Pedestal/Foundation -->
    <rect x="100" y="350" width="312" height="50" opacity="0.6"/>
    <!-- Concrete Hatch Pattern -->
    <g opacity="0.1">
      <line x1="115" y1="360" x2="140" y2="390"/>
      <line x1="130" y1="360" x2="155" y2="390"/>
      <line x1="145" y1="360" x2="170" y2="390"/>
      <line x1="160" y1="360" x2="185" y2="390"/>
      <line x1="175" y1="360" x2="200" y2="390"/>
      <line x1="190" y1="360" x2="215" y2="390"/>
      <line x1="205" y1="360" x2="230" y2="390"/>
      <line x1="220" y1="360" x2="245" y2="390"/>
      <line x1="235" y1="360" x2="260" y2="390"/>
      <line x1="250" y1="360" x2="275" y2="390"/>
      <line x1="265" y1="360" x2="290" y2="390"/>
      <line x1="280" y1="360" x2="305" y2="390"/>
      <line x1="295" y1="360" x2="320" y2="390"/>
      <line x1="310" y1="360" x2="335" y2="390"/>
      <line x1="325" y1="360" x2="350" y2="390"/>
      <line x1="340" y1="360" x2="365" y2="390"/>
      <line x1="355" y1="360" x2="380" y2="390"/>
    </g>
    <!-- Base Plate -->
    <rect x="186" y="320" width="140" height="30" opacity="0.95"/>
    <line x1="186" y1="330" x2="326" y2="330" opacity="0.5"/>
    <!-- Column Shaft -->
    <rect x="210" y="120" width="92" height="200" opacity="0.9"/>
    <!-- Column Flanges (I-beam style) -->
    <rect x="205" y="120" width="102" height="15" opacity="0.85"/>
    <rect x="205" y="305" width="102" height="15" opacity="0.85"/>
    <!-- Web stiffeners at base -->
    <rect x="230" y="300" width="8" height="20" opacity="0.7"/>
    <rect x="274" y="300" width="8" height="20" opacity="0.7"/>
    <!-- Anchor Bolts -->
    <circle cx="210" cy="335" r="8" opacity="0.9"/>
    <circle cx="302" cy="335" r="8" opacity="0.9"/>
    <circle cx="210" cy="335" r="4" opacity="0.5"/>
    <circle cx="302" cy="335" r="4" opacity="0.5"/>
    <!-- Bolt Shafts -->
    <line x1="210" y1="335" x2="210" y2="390" opacity="0.7" stroke-width="3"/>
    <line x1="302" y1="335" x2="302" y2="390" opacity="0.7" stroke-width="3"/>
    <!-- Nut detail -->
    <polygon points="206,330 214,330 216,338 210,342 204,338" opacity="0.8" stroke-width="1"/>
    <polygon points="298,330 306,330 308,338 302,342 296,338" opacity="0.8" stroke-width="1"/>
    <!-- Center Line -->
    <line x1="256" y1="100" x2="256" y2="420" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="5,5" opacity="0.3"/>
    <!-- Weld symbol -->
    <path d="M 205 335 Q 210 340 215 335" opacity="0.6" stroke-width="1.5"/>
    <path d="M 297 335 Q 302 340 307 335" opacity="0.6" stroke-width="1.5"/>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <!-- Column height -->
    <line x1="170" y1="120" x2="170" y2="320"/>
    <line x1="165" y1="120" x2="175" y2="120"/>
    <line x1="165" y1="320" x2="175" y2="320"/>
    <text x="160" y="220" fill="#ffffff" font-size="9" text-anchor="end" opacity="0.6">H=3.0m</text>
    <!-- Base plate dimension -->
    <line x1="186" y1="300" x2="326" y2="300"/>
    <text x="256" y="295" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.6">BP 300x300x25</text>
    <!-- Anchor bolt spacing -->
    <line x1="210" y1="370" x2="302" y2="370"/>
    <line x1="210" y1="365" x2="210" y2="375"/>
    <line x1="302" y1="365" x2="302" y2="375"/>
    <text x="256" y="385" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.6">s=200</text>
  </g>
  
  <!-- Section Label -->
  <text x="340" y="280" fill="#ffffff" font-size="8" opacity="0.4">W250x33</text>
</svg>