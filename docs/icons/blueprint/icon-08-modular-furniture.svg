<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Modular Furniture Frame -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main Outer Frame -->
    <rect x="140" y="120" width="232" height="272" opacity="0.95"/>
    <!-- Top Frame -->
    <rect x="135" y="115" width="242" height="15" opacity="0.9"/>
    <!-- Bottom Frame -->
    <rect x="135" y="382" width="242" height="15" opacity="0.9"/>
    <!-- Vertical Dividers -->
    <line x1="224" y1="120" x2="224" y2="392" opacity="0.85"/>
    <line x1="308" y1="120" x2="308" y2="392" opacity="0.85"/>
    <!-- Horizontal Shelf Lines -->
    <line x1="140" y1="210" x2="372" y2="210" opacity="0.75" stroke-width="1.5"/>
    <line x1="140" y1="300" x2="372" y2="300" opacity="0.75" stroke-width="1.5"/>
    <!-- Corner Connectors -->
    <rect x="136" y="116" width="12" height="12" opacity="0.8"/>
    <rect x="364" y="116" width="12" height="12" opacity="0.8"/>
    <rect x="136" y="384" width="12" height="12" opacity="0.8"/>
    <rect x="364" y="384" width="12" height="12" opacity="0.8"/>
    <!-- Middle Connectors -->
    <rect x="218" y="116" width="12" height="12" opacity="0.8"/>
    <rect x="302" y="116" width="12" height="12" opacity="0.8"/>
    <rect x="218" y="384" width="12" height="12" opacity="0.8"/>
    <rect x="302" y="384" width="12" height="12" opacity="0.8"/>
    <!-- Vertical Posts Detail -->
    <rect x="140" y="120" width="8" height="272" opacity="0.6"/>
    <rect x="224" y="120" width="8" height="272" opacity="0.6"/>
    <rect x="308" y="120" width="8" height="272" opacity="0.6"/>
    <rect x="364" y="120" width="8" height="272" opacity="0.6"/>
    <!-- Shelf Support Pins -->
    <circle cx="152" cy="210" r="2" opacity="0.7"/>
    <circle cx="160" cy="210" r="2" opacity="0.7"/>
    <circle cx="152" cy="300" r="2" opacity="0.7"/>
    <circle cx="160" cy="300" r="2" opacity="0.7"/>
    <circle cx="236" cy="210" r="2" opacity="0.7"/>
    <circle cx="244" cy="210" r="2" opacity="0.7"/>
    <circle cx="320" cy="210" r="2" opacity="0.7"/>
    <circle cx="328" cy="210" r="2" opacity="0.7"/>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <line x1="120" y1="410" x2="372" y2="410"/>
    <line x1="140" y1="392" x2="140" y2="420"/>
    <line x1="372" y1="392" x2="372" y2="420"/>
    <text x="256" y="435" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.6">W=900mm</text>
    <line x1="100" y1="120" x2="100" y2="392"/>
    <line x1="95" y1="120" x2="105" y2="120"/>
    <line x1="95" y1="392" x2="105" y2="392"/>
    <text x="85" y="256" fill="#ffffff" font-size="9" text-anchor="end" opacity="0.6">H=1200mm</text>
  </g>
  
  <!-- Module Dimensions -->
  <text x="182" y="200" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">300</text>
  <text x="266" y="200" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">300</text>
  <text x="340" y="200" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.4">260</text>
</svg>