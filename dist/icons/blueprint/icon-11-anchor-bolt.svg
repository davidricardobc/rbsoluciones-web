<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Anchor Bolt Connection Detail -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Concrete Foundation Block -->
    <rect x="100" y="300" width="312" height="120" opacity="0.6"/>
    <line x1="100" y1="340" x2="412" y2="340" opacity="0.4" stroke-width="1"/>
    <line x1="100" y1="380" x2="412" y2="380" opacity="0.4" stroke-width="1"/>
    <!-- Concrete Hatch -->
    <g opacity="0.15">
      <line x1="120" y1="302" x2="150" y2="330"/>
      <line x1="130" y1="302" x2="160" y2="330"/>
      <line x1="140" y1="302" x2="170" y2="330"/>
      <line x1="150" y1="302" x2="180" y2="330"/>
    </g>
    <!-- Base Plate -->
    <rect x="176" y="270" width="160" height="30" opacity="0.95"/>
    <!-- Column/Post -->
    <rect x="196" y="120" width="120" height="150" opacity="0.9"/>
    <rect x="190" y="120" width="132" height="10" opacity="0.85"/>
    <!-- Anchor Bolts -->
    <circle cx="196" cy="285" r="8" opacity="0.9"/>
    <circle cx="316" cy="285" r="8" opacity="0.9"/>
    <circle cx="256" cy="285" r="8" opacity="0.9"/>
    <circle cx="226" cy="285" r="8" opacity="0.9"/>
    <circle cx="286" cy="285" r="8" opacity="0.9"/>
    <!-- Bolt Shafts -->
    <line x1="196" y1="285" x2="196" y2="360" opacity="0.7" stroke-width="3"/>
    <line x1="316" y1="285" x2="316" y2="360" opacity="0.7" stroke-width="3"/>
    <line x1="256" y1="285" x2="256" y2="360" opacity="0.7" stroke-width="3"/>
    <line x1="226" y1="285" x2="226" y2="340" opacity="0.6" stroke-width="3"/>
    <line x1="286" y1="285" x2="286" y2="340" opacity="0.6" stroke-width="3"/>
    <!-- Bolt Heads (embedded in concrete) -->
    <rect x="191" y="355" width="10" height="8" opacity="0.7"/>
    <rect x="311" y="355" width="10" height="8" opacity="0.7"/>
    <rect x="251" y="355" width="10" height="8" opacity="0.7"/>
    <!-- Nuts and Washers -->
    <rect x="192" y="280" width="8" height="3" opacity="0.8"/>
    <rect x="312" y="280" width="8" height="3" opacity="0.8"/>
    <rect x="252" y="280" width="8" height="3" opacity="0.8"/>
    <rect x="190" y="275" width="12" height="5" opacity="0.9"/>
    <rect x="310" y="275" width="12" height="5" opacity="0.9"/>
    <rect x="250" y="275" width="12" height="5" opacity="0.9"/>
    <!-- Level Lines -->
    <line x1="100" y1="295" x2="176" y2="295" opacity="0.5" stroke-width="1"/>
    <text x="130" y="292" fill="#ffffff" font-size="8" opacity="0.6">±0.00</text>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <!-- Embedment depth -->
    <line x1="170" y1="300" x2="170" y2="420"/>
    <line x1="165" y1="300" x2="175" y2="300"/>
    <line x1="165" y1="420" x2="175" y2="420"/>
    <text x="160" y="360" fill="#ffffff" font-size="8" text-anchor="end" opacity="0.6">d=250</text>
    <!-- Base plate dimension -->
    <line x1="176" y1="260" x2="336" y2="260"/>
    <text x="256" y="255" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.6">b=200mm</text>
  </g>
  
  <!-- Bolt Annotation -->
  <text x="350" y="350" fill="#ffffff" font-size="8" opacity="0.5">M16</text>
</svg>