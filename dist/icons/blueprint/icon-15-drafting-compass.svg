<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Classic Drafting Compass Divider -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Compass Heads -->
    <!-- Left Leg -->
    <line x1="180" y1="256" x2="230" y2="150" opacity="0.95" stroke-width="4"/>
    <!-- Right Leg -->
    <line x1="180" y1="256" x2="280" y2="320" opacity="0.95" stroke-width="4"/>
    <!-- Pivot Joint -->
    <circle cx="180" cy="256" r="18" opacity="0.9" stroke-width="3"/>
    <circle cx="180" cy="256" r="8" opacity="0.7" stroke-width="2"/>
    <circle cx="180" cy="256" r="3" opacity="1" fill="#ffffff"/>
    <!-- Adjustment Wheels/Hinges -->
    <rect x="172" y="238" width="16" height="8" rx="2" opacity="0.85"/>
    <!-- Compass Point (Needle) -->
    <polygon points="230,150 227,105 233,105" opacity="0.9" stroke-width="1.5"/>
    <line x1="230" y1="150" x2="230" y2="100" opacity="0.9" stroke-width="3"/>
    <!-- Pencil/Drawing Point -->
    <line x1="280" y1="320" x2="320" y2="350" opacity="0.9" stroke-width="4"/>
    <polygon points="320,350 325,375 315,375" opacity="0.8" stroke-width="1.5"/>
    <circle cx="320" cy="350" r="6" opacity="0.7" stroke-width="2"/>
    <!-- Arc showing intended circle -->
    <path d="M 250 350 Q 320 380 390 320" opacity="0.4" stroke-width="1.5" stroke-dasharray="4,4"/>
    <!-- Handle/Bow (top part) -->
    <line x1="170" y1="256" x2="140" y2="200" opacity="0.7" stroke-width="3"/>
    <circle cx="140" cy="200" r="5" opacity="0.8"/>
    <!-- Fine adjustment screw line -->
    <line x1="195" y1="220" x2="200" y2="210" opacity="0.5" stroke-width="1"/>
    <line x1="165" y1="240" x2="150" y2="230" opacity="0.5" stroke-width="1"/>
    <!-- Cross hairs at pivot -->
    <line x1="175" y1="251" x2="185" y2="261" opacity="0.4" stroke-width="0.5"/>
    <line x1="175" y1="261" x2="185" y2="251" opacity="0.4" stroke-width="0.5"/>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.4" fill="none">
    <!-- Radius dimension -->
    <line x1="180" y1="256" x2="320" y2="350" stroke-dasharray="2,2"/>
    <text x="230" y="305" fill="#ffffff" font-size="9" text-anchor="end" opacity="0.5">R=?mm</text>
    <!-- Span/Opening angle -->
    <path d="M 210 200 Q 180 180 150 230" opacity="0.3"/>
    <text x="205" y="190" fill="#ffffff" font-size="8" opacity="0.4">α</text>
  </g>
  
  <!-- Engineer Stamp style marks -->
  <text x="350" y="450" fill="#ffffff" font-size="7" opacity="0.3" font-family="monospace">D.RICARDO</text>
  <text x="350" y="460" fill="#ffffff" font-size="6" opacity="0.3" font-family="monospace">ING.CIVIL</text>
</svg>