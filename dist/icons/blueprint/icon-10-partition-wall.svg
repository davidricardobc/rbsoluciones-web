<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Partition Wall Frame -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main Frame Border -->
    <rect x="120" y="100" width="272" height="272" opacity="0.95"/>
    <!-- Top Track -->
    <rect x="115" y="95" width="282" height="10" opacity="0.9"/>
    <!-- Bottom Track -->
    <rect x="115" y="367" width="282" height="10" opacity="0.9"/>
    <!-- Vertical Studs -->
    <rect x="120" y="100" width="8" height="272" opacity="0.8"/>
    <rect x="176" y="100" width="6" height="272" opacity="0.75"/>
    <rect x="232" y="100" width="6" height="272" opacity="0.75"/>
    <rect x="288" y="100" width="6" height="272" opacity="0.75"/>
    <rect x="344" y="100" width="6" height="272" opacity="0.75"/>
    <rect x="384" y="100" width="8" height="272" opacity="0.8"/>
    <!-- Horizontal Noggins/Bracing -->
    <rect x="120" y="180" width="272" height="4" opacity="0.6"/>
    <rect x="120" y="288" width="272" height="4" opacity="0.6"/>
    <!-- Diagonal Bracing -->
    <line x1="144" y1="100" x2="230" y2="288" opacity="0.5" stroke-width="1.5"/>
    <line x1="288" y1="180" x2="384" y2="372" opacity="0.5" stroke-width="1.5"/>
    <!-- Panel Lines -->
    <line x1="182" y1="105" x2="182" y2="367" opacity="0.4" stroke-width="1"/>
    <line x1="238" y1="105" x2="238" y2="367" opacity="0.4" stroke-width="1"/>
    <line x1="294" y1="105" x2="294" y2="367" opacity="0.4" stroke-width="1"/>
    <line x1="350" y1="105" x2="350" y2="367" opacity="0.4" stroke-width="1"/>
    <!-- Screw/Nail Marks -->
    <circle cx="134" cy="234" r="1.5" opacity="0.5"/>
    <circle cx="160" cy="234" r="1.5" opacity="0.5"/>
    <circle cx="198" cy="234" r="1.5" opacity="0.5"/>
    <circle cx="262" cy="234" r="1.5" opacity="0.5"/>
    <circle cx="326" cy="234" r="1.5" opacity="0.5"/>
    <circle cx="370" cy="234" r="1.5" opacity="0.5"/>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <!-- Width -->
    <line x1="100" y1="390" x2="392" y2="390"/>
    <line x1="120" y1="377" x2="120" y2="400"/>
    <line x1="392" y1="377" x2="392" y2="400"/>
    <text x="256" y="415" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.6">W=2800mm</text>
    <!-- Height -->
    <line x1="80" y1="100" x2="80" y2="372"/>
    <line x1="75" y1="100" x2="85" y2="100"/>
    <line x1="75" y1="372" x2="85" y2="372"/>
    <text x="65" y="236" fill="#ffffff" font-size="9" text-anchor="end" opacity="0.6">H=3000mm</text>
    <!-- Stud Spacing -->
    <line x1="176" y1="80" x2="232" y2="80"/>
    <line x1="176" y1="75" x2="176" y2="85"/>
    <line x1="232" y1="75" x2="232" y2="85"/>
    <text x="204" y="70" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.6">C/C 600</text>
  </g>
  
  <!-- Section Hatch -->
  <g stroke="#ffffff" stroke-width="0.5" opacity="0.2" fill="none">
    <line x1="145" y1="115" x2="170" y2="140"/>
    <line x1="145" y1="135" x2="170" y2="160"/>
    <line x1="145" y1="155" x2="170" y2="180"/>
  </g>
</svg>