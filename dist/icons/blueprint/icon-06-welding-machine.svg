<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Welding Machine -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main Body Box -->
    <rect x="140" y="160" width="200" height="180" rx="8" opacity="0.95"/>
    <!-- Control Panel Area -->
    <rect x="155" y="175" width="170" height="85" opacity="0.8"/>
    <!-- Digital Display -->
    <rect x="165" y="190" width="60" height="35" opacity="0.9"/>
    <text x="195" y="215" fill="#ffffff" font-size="14" text-anchor="middle" opacity="0.8">250</text>
    <!-- Control Knobs -->
    <circle cx="250" cy="207" r="15" opacity="0.85"/>
    <circle cx="280" cy="207" r="10" opacity="0.85"/>
    <circle cx="305" cy="207" r="10" opacity="0.85"/>
    <!-- Knob Markers -->
    <line x1="250" y1="207" x2="250" y2="197" opacity="0.9"/>
    <line x1="280" y1="207" x2="280" y2="199" opacity="0.9"/>
    <!-- Switches -->
    <rect x="165" y="240" width="12" height="12" opacity="0.7"/>
    <rect x="185" y="240" width="12" height="12" opacity="0.7"/>
    <rect x="205" y="240" width="12" height="12" opacity="0.7"/>
    <!-- Cable Outlet -->
    <circle cx="300" cy="250" r="12" opacity="0.8"/>
    <!-- Cable -->
    <path d="M 300 262 Q 300 300 340 320 Q 380 340 380 350" opacity="0.6" stroke-width="3"/>
    <path d="M 370 345 L 380 350 L 375 360" opacity="0.7" stroke-width="2"/>
    <!-- Ground Clamp -->
    <path d="M 180 340 L 180 350 L 160 360 L 160 370" opacity="0.7" stroke-width="3"/>
    <line x1="180" y1="340" x2="180" y2="250" opacity="0.6" stroke-width="2"/>
    <!-- Ventilation Grille -->
    <line x1="140" y1="260" x2="340" y2="260" opacity="0.4" stroke-width="1"/>
    <line x1="140" y1="275" x2="340" y2="275" opacity="0.4" stroke-width="1"/>
    <line x1="140" y1="290" x2="340" y2="290" opacity="0.4" stroke-width="1"/>
    <line x1="140" y1="305" x2="340" y2="305" opacity="0.4" stroke-width="1"/>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <line x1="120" y1="340" x2="340" y2="340"/>
    <line x1="180" y1="340" x2="180" y2="365"/>
    <line x1="360" y1="370" x2="360" y2="397"/>
  </g>
</svg>