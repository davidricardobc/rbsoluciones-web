<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- Welded Joint Detail -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main Plate -->
    <rect x="100" y="220" width="312" height="72" opacity="0.95"/>
    <!-- Vertical Member -->
    <rect x="220" y="100" width="72" height="120" opacity="0.9"/>
    <!-- Fillet Weld Symbol -->
    <path d="M 220 220 L 256 180 L 292 220" opacity="0.85" stroke-width="2.5"/>
    <!-- Weld Throat Lines -->
    <line x1="225" y1="215" x2="256" y2="188" opacity="0.6" stroke-width="1"/>
    <line x1="287" y1="215" x2="256" y2="188" opacity="0.6" stroke-width="1"/>
    <!-- Cross Section Hatch -->
    <line x1="235" y1="230" x2="277" y2="282" opacity="0.4" stroke-width="1"/>
    <line x1="255" y1="230" x2="297" y2="282" opacity="0.4" stroke-width="1"/>
    <!-- Fillet on bottom -->
    <path d="M 220 292 L 256 332 L 292 292" opacity="0.85" stroke-width="2.5"/>
  </g>
  
  <!-- Weld Symbols -->
  <g fill="#ffffff" opacity="0.7">
    <polygon points="246,160 256,145 266,160" stroke="#ffffff" stroke-width="1"/>
    <text x="256" y="138" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.8">5mm</text>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <!-- Plate thickness -->
    <line x1="80" y1="220" x2="80" y2="292"/>
    <line x1="75" y1="220" x2="85" y2="220"/>
    <line x1="75" y1="292" x2="85" y2="292"/>
    <text x="65" y="260" fill="#ffffff" font-size="9" text-anchor="end" opacity="0.6">t=12mm</text>
    <!-- Member width -->
    <line x1="220" y1="80" x2="292" y2="80"/>
    <line x1="220" y1="75" x2="220" y2="85"/>
    <line x1="292" y1="75" x2="292" y2="85"/>
    <text x="256" y="70" fill="#ffffff" font-size="9" text-anchor="middle" opacity="0.6">b=72mm</text>
  </g>
  
  <!-- Section A-A -->
  <text x="400" y="256" fill="#ffffff" font-size="10" opacity="0.6">A</text>
  <line x1="395" y1="260" x2="395" y2="320" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <text x="400" y="330" fill="#ffffff" font-size="10" opacity="0.6">A</text>
  <circle cx="395" cy="256" r="3" fill="#ffffff" opacity="0.4"/>
</svg>