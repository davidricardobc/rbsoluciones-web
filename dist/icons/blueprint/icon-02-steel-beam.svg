<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#2a4a6e" stroke-width="0.5" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="512" height="512" fill="#1a3a5c"/>
  <rect width="512" height="512" fill="url(#grid)"/>
  
  <!-- I-Beam Structure -->
  <g stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Web (center) -->
    <rect x="246" y="120" width="20" height="272" opacity="0.9"/>
    <!-- Top Flange -->
    <rect x="180" y="110" width="152" height="18" opacity="0.95"/>
    <!-- Bottom Flange -->
    <rect x="180" y="384" width="152" height="18" opacity="0.95"/>
    <!-- Connection Plates -->
    <rect x="175" y="106" width="162" height="4" opacity="0.7"/>
    <rect x="175" y="402" width="162" height="4" opacity="0.7"/>
    <!-- Bolt Holes -->
    <circle cx="190" cy="119" r="4" opacity="0.8"/>
    <circle cx="210" cy="119" r="4" opacity="0.8"/>
    <circle cx="230" cy="119" r="4" opacity="0.8"/>
    <circle cx="282" cy="119" r="4" opacity="0.8"/>
    <circle cx="302" cy="119" r="4" opacity="0.8"/>
    <circle cx="322" cy="119" r="4" opacity="0.8"/>
    <circle cx="190" cy="393" r="4" opacity="0.8"/>
    <circle cx="210" cy="393" r="4" opacity="0.8"/>
    <circle cx="230" cy="393" r="4" opacity="0.8"/>
    <circle cx="282" cy="393" r="4" opacity="0.8"/>
    <circle cx="302" cy="393" r="4" opacity="0.8"/>
    <circle cx="322" cy="393" r="4" opacity="0.8"/>
  </g>
  
  <!-- Dimension Lines -->
  <g stroke="#ffffff" stroke-width="1" opacity="0.5" fill="none">
    <!-- Height dimension -->
    <line x1="160" y1="110" x2="160" y2="406"/>
    <line x1="155" y1="110" x2="165" y2="110"/>
    <line x1="155" y1="406" x2="165" y2="406"/>
    <text x="145" y="258" fill="#ffffff" font-size="10" text-anchor="end" opacity="0.6">H=300mm</text>
    <!-- Width dimension -->
    <line x1="180" y1="430" x2="332" y2="430"/>
    <line x1="180" y1="425" x2="180" y2="435"/>
    <line x1="332" y1="425" x2="332" y2="435"/>
    <text x="256" y="450" fill="#ffffff" font-size="10" text-anchor="middle" opacity="0.6">B=200mm</text>
    <!-- Web thickness -->
    <line x1="240" y1="150" x2="240" y2="160"/>
    <line x1="272" y1="150" x2="272" y2="160"/>
    <text x="256" y="145" fill="#ffffff" font-size="8" text-anchor="middle" opacity="0.6">tw</text>
  </g>
  
  <!-- Center Line -->
  <line x1="256" y1="110" x2="256" y2="406" stroke="#ffffff" stroke-width="0.5" stroke-dasharray="5,5" opacity="0.3"/>
</svg>